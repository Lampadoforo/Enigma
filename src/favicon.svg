<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
	<style>
		text {
			font-size: 4px;
			text-anchor: middle;
			translate: 0 1px;
		}
		.v {
			font-style: italic;
		}
	</style>
	<polygon fill="aqua" points="0,4 2,0 4,4"/>
